// ============================================================
//  CS2 GOTV+ Broadcast Config
//  Drop this file into: csgo/cfg/
//  Then run in console: exec gotv_broadcast
// ============================================================

// Enable GOTV
tv_enable 1

// No delay for live dashboard (set higher for anti-cheat in tournaments)
tv_delay 0

// Performance tuning
tv_deltacache 2
tv_snapshotrate 64
tv_transmitall 1

// ── GOTV+ Broadcast ────────────────────────────────────────
// Change this URL to your deployed backend!
tv_broadcast_url "https://TVUJ-BACKEND.onrender.com/ingest"

// Auth token (leave empty if BroadcastAuth is empty on backend)
tv_broadcast_origin_auth ""

// Start broadcasting
tv_broadcast 1
